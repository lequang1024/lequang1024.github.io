<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quangle Tools — Style Reference: 099</title>

    <!-- Google Fonts: Space Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Tailwind config for 099 theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#000000',
                        ghost: '#ffffff',
                        steel: '#1d1d1d',
                        muted: '#383838',
                        dim: '#888888',
                    },
                    fontFamily: {
                        sans: ['Space Mono', 'monospace'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #383838;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #888888;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-feature-settings: "zero";
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LL3LWXVBHR"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-LL3LWXVBHR');
    </script>

    
</head>
<body class="text-ghost bg-midnight font-mono text-[16px] leading-[1.2] font-normal tracking-[0.24px]">
    <div id="root"></div>

    <!-- Load generated tools -->
    <script src="tools/repo-tools.js?v=2.0.0"></script>
    <!-- Main App -->
    <script type="text/babel" src="App.jsx?v=2.0.0"></script>
</body>
</html>
