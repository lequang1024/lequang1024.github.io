<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quangle Tools — Style Reference: Dries Bos</title>

    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Tailwind config for Dries Bos theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        parchment: '#e8e7e3',
                        ink: '#050200',
                        ash: '#747472',
                        black: '#000000',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e8e7e3;
        }
        ::-webkit-scrollbar-thumb {
            background: #747472;
            border-radius: 0px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #050200;
        }
        body {
            background-color: #e8e7e3;
            color: #050200;
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LL3LWXVBHR"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-LL3LWXVBHR');
    </script>

    
</head>
<body class="text-ink bg-parchment font-sans text-[20px] leading-[1.45] font-normal">
    <div id="root"></div>

    <!-- Load generated tools -->
    <script src="tools/repo-tools.js?v=2.0.0"></script>
    <!-- Main App -->
    <script type="text/babel" src="App.jsx?v=2.0.0"></script>
</body>
</html>
